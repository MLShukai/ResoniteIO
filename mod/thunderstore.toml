# Thunderstore CLI 設定。詳細: https://github.com/thunderstore-io/thunderstore-cli
# mod/Directory.Build.targets の PackTS から `dotnet tcli build/publish` で読まれる。

[config]
schemaVersion = "0.0.1"

[package]
namespace = "mlshukai"  # MLShukai Thunderstore チーム
name = "ResoniteIO"
# versionNumber は ResoniteIO.csproj の <Version> から渡される (PackTS 経由)
description = "Bidirectional IPC bridge mod that exposes Resonite as an execution environment for AI agents."
websiteUrl = "https://github.com/MLShukai/ResoniteIO"
containsNsfwContent = false

# 依存: ResoniteIO が直接必要とする mod を宣言する (deps-of-deps は基本書かない)。
# RenderiteHook は InterprocessLib 経由で transitive にも来るが、Camera v2 の
# renderer doorstop inject の起点なので明示しておく。
# 以下は Thunderstore が transitive に解決するため記載しない:
#   ResoniteModding-RenderiteHook → ResoniteModding-BepInExRenderer
#   {Nytra-InterprocessLib, ResoniteModding-BepisResoniteWrapper}
#     → ResoniteModding-BepisLoader → ResoniteModding-BepInExResoniteShim
# よって BepInExRenderer / BepisLoader / BepInExResoniteShim は記載不要。
# 版整合: BepisResoniteWrapper は ResoniteIO.csproj の PackageReference と、
#         InterprocessLib / RenderiteHook は Gale プロファイル / setup-resonite-env skill と揃える。
[package.dependencies]
Nytra-InterprocessLib = "3.0.1"
ResoniteModding-RenderiteHook = "1.1.1"
ResoniteModding-BepisResoniteWrapper = "1.0.2"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

# 成果物を plugins/ResoniteIO/ 配下に配置 (BepInEx が認識する layout)
[[build.copy]]
source = "./src/ResoniteIO/bin/Release/ResoniteIO.dll"
target = "plugins/ResoniteIO/"

[[build.copy]]
source = "./src/ResoniteIO/bin/Release/ResoniteIO.pdb"
target = "plugins/ResoniteIO/"

# CHANGELOG / LICENSE を同梱したい場合はコメント解除する
# [[build.copy]]
# source = "./CHANGELOG.md"
# target = "/"
# [[build.copy]]
# source = "../LICENSE"
# target = "/"

[publish]
repository = "https://thunderstore.io"
communities = ["resonite"]

[publish.categories]
resonite = ["mods"]
