// Connection service: 制御プレーンの最小 RPC を定義する。
//
// `Ping` は両言語間のコード生成パイプラインと UDS gRPC 疎通を確認するための
// スモーク RPC。Step 1 (Skeleton) では本 RPC のみを提供し、モダリティごとの
// streaming RPC は別ファイル (camera.proto, audio.proto, ...) で順次追加する。
syntax = "proto3";

package resonite_io.v1;

option csharp_namespace = "ResoniteIO.V1";

// PingRequest はクライアントが任意のメッセージ文字列を送信する。
message PingRequest {
  string message = 1;
}

// PingResponse はサーバが受信したメッセージをそのまま返し、サーバ側で測定した
// Unix epoch (ナノ秒) を付与する。クライアントは RTT の概算と clock skew の
// 観測に利用できる。
message PingResponse {
  string message = 1;
  int64 server_unix_nanos = 2;
}

// Connection は制御プレーンの中心サービス。モダリティ固有の RPC は別 service に
// 分割するため、本 service は接続確認と将来的な capability negotiation のみを
// 担当する。
service Connection {
  rpc Ping(PingRequest) returns (PingResponse);
}
