// Locomotion service: Resonite desktop の基本操作 (WASD / マウスルック /
// Space (Jump) / C (Crouch)) を ExternalInput 注入で再現する stateful な
// RPC バンドル。本ファイルが velocity 単位元 / jump pulse / disconnect 規約の
// 一次正典。
//
// stateful repeater: engine の `InputAction.ExternalInput` は engine update
// tick で消費される 1-frame 寿命の slot だが、mod 側 Bridge が最新コマンドを
// 保持し tick ごとに再注入する。client は **状態が変化したときに 1 回送る
// だけで良い** (keep-alive ループは不要)。
//
// disconnect / lifecycle:
//   - `Drive` を `CompleteAsync` で graceful close → **state 維持**
//     (短命コマンドを送って閉じる idiom が成立する)。
//   - UDS 切断 / 例外 cancel → Bridge が **全 state を自動 reset**
//     (RL/ロボティクスの safety: client crash 時に暴走しない)。
//   - 明示 reset は `Reset` RPC (Drive を中断しない unary)。
syntax = "proto3";

package resonite_io.v1;

option csharp_namespace = "ResoniteIO.V1";

// クライアントからサーバへ送る制御コマンド。**部分更新**: client は変化した
// field だけを送り、未設定 (未送信) の field は wire に乗らない。mod 側 Bridge は
// stateful repeater で保持中の state を持ち、未設定 field は前回値をそのまま保持・
// engine update tick ごとに再注入する。全 8 制御 field は proto3 `optional`
// (explicit presence) なので「送った / 送らない」を wire で区別できる。
message LocomotionCommand {
  // -1=back, +1=forward。視点方向 (fly/noclip では向いた方向、walk では水平)。
  // 未設定なら Bridge は前回値を保持。
  optional float move_forward = 1;
  // -1=left, +1=right (strafe)。未設定なら前回値を保持。
  optional float move_right = 2;
  // -1=down, +1=up。**ワールド絶対**上下 (視点 pitch と独立)。
  // SmoothLocomotion の Move に効き fly/noclip で上下移動、歩行系では engine が
  // 自動的に無視。未設定なら前回値を保持。
  optional float move_up = 3;
  // Yaw angular rate, positive=right。未設定なら前回値を保持。
  optional float yaw_rate = 4;
  // Pitch angular rate, positive=up. Bridge は符号反転せず engine にそのまま
  // 渡す (decompile からは反転が必要に見えるが実機検証で逆挙動を確認、
  // feedback_locomotion_external_input.md §2 参照)。未設定なら前回値を保持。
  optional float pitch_rate = 5;
  // Space 相当の **pulse**。present かつ true のときだけ jump が 1 pulse 発火し、
  // Bridge は受信した次 1 engine tick だけ apply し latch を下げる (consume-once)。
  // 未設定 / present かつ false は pending を立てず、既存 pending も取り消さない。
  optional bool jump = 6;
  // Move に掛けるスカラー倍率。**単位元は 1.0** (通常歩行)。単位元 1.0 は Bridge の
  // 初期 state (`LocomotionInput.Neutral` の velocity=1.0) が担保するため、Python
  // 側 wrapper で default 1.0 を保証する必要はない。未設定なら Bridge は前回値
  // (起動直後は 1.0) を保持。Bridge は proto.velocity を素のまま Move に掛ける
  // (再解釈なし)。engine の `ScreenLocomotionDirection.FastMultiplier` (=2.0) 相当は
  // 2.0 を明示する。**ここが velocity セマンティクスの正典。**
  optional float velocity = 7;
  // Crouch 強度 [0..1]。未設定なら前回値を保持。
  optional float crouch = 8;
  // クライアント送信時刻 (UTC ナノ秒)。受信側 latency 計測用、optional (0 で skip)。
  int64 unix_nanos = 9;
}

// Drive RPC 完了時の summary。
message LocomotionDriveSummary {
  // 正常に処理したコマンド数。
  int64 received_count = 1;
  // pending を上書きした (= latest-wins で drop した) 回数。
  // 現状の直列 ApplyAsync では常に 0。将来 non-blocking bridge へ拡張する hook。
  int64 dropped_count = 2;
  // サーバ完了時刻 (UTC ナノ秒)。
  int64 unix_nanos = 3;
}

// 指定された field を中立値に戻す要求。**全 bool が false で送信された場合は
// 全 reset** と Service 層で展開される (proto3 wire default = 0 で "未指定" と
// "全 false" を区別不能なため、Reset を呼んだ以上は全部戻す解釈に倒す)。
// 部分 reset したい時は対象 field のみ true にする。
message LocomotionResetRequest {
  // move_forward / move_right / move_up / velocity を中立 (0, 0, 0, 1.0) へ。
  bool move = 1;
  // yaw_rate / pitch_rate を 0 へ。
  bool look = 2;
  // crouch を 0 へ。
  bool crouch = 3;
  // 未消費の jump pending を取り消す。
  bool jump = 4;
  // クライアント送信時刻 (UTC ナノ秒)。Optional (0 で skip)。
  int64 unix_nanos = 5;
}

// Reset RPC 完了時の summary。Service が request を canonicalize した結果
// (全 false → 全 true 展開) をそのままエコーする。次の engine tick で
// Bridge が実際に該当 field を中立に戻す責務を負うため、本 summary は
// "canonicalize 後に有効だった reset 要求" を表すのみで、engine 側で実際に
// 状態が変わったことの保証ではない。
message LocomotionResetSummary {
  // canonicalize 後に move を reset する要求があったか。
  bool move = 1;
  // canonicalize 後に look を reset する要求があったか。
  bool look = 2;
  // canonicalize 後に crouch を reset する要求があったか。
  bool crouch = 3;
  // canonicalize 後に jump を reset する要求があったか。
  bool jump = 4;
  // サーバ完了時刻 (UTC ナノ秒)。
  int64 unix_nanos = 5;
}

service Locomotion {
  // 移動 + 視点制御の client-streaming RPC。stream lifecycle と stateful
  // repeater の規約は file header / `LocomotionCommand` 参照。
  rpc Drive(stream LocomotionCommand) returns (LocomotionDriveSummary);

  // 指定 field を中立値に戻す (Drive stream を中断しない unary)。全 bool
  // が false なら全 reset (`LocomotionResetRequest` 参照)。
  rpc Reset(LocomotionResetRequest) returns (LocomotionResetSummary);
}
