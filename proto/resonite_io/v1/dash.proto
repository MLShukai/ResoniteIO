// Dash service: Resonite の Esc キーで開く userspace overlay メニュー (dash /
// RadiantDash) を engine 経由で取得・操作する modality。AI エージェントから
// 「dash を開く / 閉じる」「下部タブ (Home/Worlds/Contacts/...) を列挙・切替する」
// 「現在のタブ内の操作可能な control (押せる Button / スクロールできる ScrollRect) を
// 構造化して列挙する」「control を実行 / スクロール / ハイライトする」を行う。
//
// dash の構造: `Userspace.UserspaceWorld` 配下に globally-registered された
// `UserspaceRadiantDash` を `.Open` (bool) で開閉する。下部の **tab** バーは
// `RadiantDashScreen` 群で、現在の tab (`CurrentScreen`) の `ScreenRoot` 配下にだけ
// 操作対象の control がある。tab 切替で control は総入れ替えになる。
// dash は ContextMenu の radial メニュー (`InteractionHandler`) とは別系統。
//
// 指定キー: tab も control も **言語非依存の `ref_id`** (engine の `Slot.ReferenceID` を
// 文字列化したもの) を主キーにする。dash UI は言語ごとに localize されるため、表示
// テキスト (`label`) ではなく `ref_id` と (取得できれば) `locale_key` で一意特定し、
// SetTab / Invoke / Scroll / Highlight はその `ref_id` で engine 側を
// `ReferenceController.GetObjectOrNull` 解決して操作する。`label` / index による選択は
// client 側 (Python / CLI) で `ref_id` に解決してから送る (wire は言語非依存を保つ)。
//
// 状態変化系 (SetTab / Invoke / Scroll / Highlight) は軽量な `DashActionResult` を返し、
// 解決失敗は例外ではなく `found=false` / `ok=false` で表す (soft-fail)。control 一覧は
// `ListControls` で明示的に取り直す (操作後に UI が総入れ替えになり得るため)。dash/
// userspace 未準備時のみ FailedPrecondition。engine への dispatch は同期マーシャル
// (`RunSynchronously` + `TaskCompletionSource`)。
syntax = "proto3";

package resonite_io.v1;

option csharp_namespace = "ResoniteIO.V1";

// dash (userspace overlay) の開閉状態スナップショット。
message DashState {
  // dash が開いているか (`UserspaceRadiantDash.Open`)。
  bool is_open = 1;
  // 開閉アニメーションの lerp [0.0, 1.0] (`UserspaceRadiantDash.OpenLerp`)。
  float open_lerp = 2;
}

// 下部タブバーの 1 タブ (`RadiantDashScreen`)。
// `ref_id` と `locale_key` (例 "Dash.Screens.Worlds") が言語非依存キー。
message DashTab {
  // screen slot の `ReferenceID.ToString()`。SetTab の exact 指定キー。
  string ref_id = 1;
  // 言語非依存キー。`LocaleHelper.GetLocalizedDriver(screen.Label)?.Key?.Value`。
  // 取得できない tab では空文字。
  string locale_key = 2;
  // `screen.Slot.Name` (例 "Worlds")。第 2 の言語非依存 ID。
  string name = 3;
  // `screen.Label.Value` (localize 済み表示テキスト。debug / 人間向け)。
  string label = 4;
  // この tab が現在表示中か (`screen == dash.Dash.CurrentScreen.Target`)。
  bool is_current = 5;
  // 遷移可能か (`screen.ScreenEnabled.Value`。例: ログアウト中の Contacts は false)。
  bool enabled = 6;
}

// `ListTabs` の戻り。dash の全 tab 一覧。
message DashTabList {
  repeated DashTab tabs = 1;
}

// 現在の tab 内の操作可能な control 1 個 (押せる `Button` か、スクロールできる
// `ScrollRect`)。v1 はこの 2 種のみ (slider / text field は対象外)。
message DashControl {
  // control slot の `ReferenceID.ToString()`。Invoke / Scroll / Highlight の主キー。
  string ref_id = 1;
  // "button" | "scroll"。server 側で正規化済み。
  string control_type = 2;
  // 人間向け表示ラベル (localize 済み)。`Button.LabelText` → 子 `Text.Content`
  // → `locale_key` → `Slot.Name` の優先で解決。icon-only button 等では空のこともある。
  string label = 3;
  // 言語非依存の locale key (`LocaleStringDriver.Key`)。生文字列ラベルでは空文字。
  string locale_key = 4;
  // 操作可能か (`Button.Enabled` 等)。include_disabled=true のとき disabled も含む。
  bool enabled = 5;
  // 直近の列挙済み control 祖先の ref_id (軽い階層表示用。最上位は空文字)。
  string parent_ref_id = 6;
  // 列挙済み control 階層の深さ (最上位 = 0)。
  int32 depth = 7;
}

// `ListControls` の戻り。現在の tab 内の control 一覧 (reading 順 = 上→下, 左→右)。
message DashControlList {
  repeated DashControl controls = 1;
}

// 状態変化系操作 (SetTab / Invoke / Scroll / Highlight) の結果。
message DashActionResult {
  // 操作が適用できたか。
  bool ok = 1;
  // 指定 ref_id の対象が解決できたか (false なら ok も false)。
  bool found = 2;
  // 操作対象として解決した ref_id (echo back)。
  string ref_id = 3;
  // 補足 (型不一致 / 未解決 / disabled などの理由)。
  string detail = 4;
}

message DashOpenRequest {}

message DashCloseRequest {}

message DashGetStateRequest {}

message DashListTabsRequest {}

message DashSetTabRequest {
  // exact 指定キー (screen slot の ReferenceID)。非空なら優先。
  string ref_id = 1;
  // 言語非依存キー (例 "Dash.Screens.Worlds")。ref_id が空なら使う。
  string locale_key = 2;
}

message DashListControlsRequest {
  // true なら disabled control も含める。default(false) は enabled のみ。
  bool include_disabled = 1;
}

message DashInvokeRequest {
  string ref_id = 1;
}

message DashScrollRequest {
  string ref_id = 1;
  // `ScrollRect.NormalizedPosition` への加算量 ([0,1] 空間)。
  float delta_x = 2;
  float delta_y = 3;
}

message DashHighlightRequest {
  string ref_id = 1;
}

service Dash {
  // dash (userspace overlay) を開く。既に開いていれば no-op で現状態を返す。
  rpc Open(DashOpenRequest) returns (DashState);
  // dash を閉じる。
  rpc Close(DashCloseRequest) returns (DashState);
  // 現在の dash 開閉状態を取得する。
  rpc GetState(DashGetStateRequest) returns (DashState);
  // 下部タブバーの全 tab を言語非依存キー付きで列挙する。dash が閉じていても列挙できる。
  rpc ListTabs(DashListTabsRequest) returns (DashTabList);
  // 指定 tab (ref_id 優先、でなければ locale_key) へ切り替える。両空は InvalidArgument。
  rpc SetTab(DashSetTabRequest) returns (DashActionResult);
  // 現在の tab 内の操作可能な control を reading 順で列挙する (tab 切替は SetTab で先に行う)。
  rpc ListControls(DashListControlsRequest) returns (DashControlList);
  // 指定 ref_id の control を実行する (Button.SimulatePress)。
  rpc Invoke(DashInvokeRequest) returns (DashActionResult);
  // 指定 ref_id の control にスクロールを当てる (ScrollRect)。
  rpc Scroll(DashScrollRequest) returns (DashActionResult);
  // 指定 ref_id の control をハイライト (hover) する。実行はしない (Button のみ対応)。
  rpc Highlight(DashHighlightRequest) returns (DashActionResult);
}
